x-build-proxy-args: &build-proxy-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}
  http_proxy: ${http_proxy:-}
  https_proxy: ${https_proxy:-}
  no_proxy: ${no_proxy:-}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: very_english
      POSTGRES_PASSWORD: very_english
      POSTGRES_DB: very_english
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U very_english -d very_english"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set ve http://minio:9000 minioadmin minioadmin; do
          echo "waiting for minio..."
          sleep 2
        done
        mc mb ve/very-english-media --ignore-existing
    restart: "no"

  migrate:
    build:
      context: .
      args: *build-proxy-args
    command: ["poetry", "run", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg://very_english:very_english@postgres:5432/very_english
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      args: *build-proxy-args
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://very_english:very_english@postgres:5432/very_english
      JWT_SECRET_KEY: dev-jwt-secret-change-me
      S3_BUCKET: very-english-media
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_PUBLIC_ENDPOINT_URL: http://localhost:9000
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      REDIS_URL: redis://redis:6379/0
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      EMAIL_OTP_CODE_TTL_SECONDS: ${EMAIL_OTP_CODE_TTL_SECONDS:-300}
      EMAIL_OTP_CODE_LENGTH: ${EMAIL_OTP_CODE_LENGTH:-6}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  billing-renew:
    build:
      context: .
      args: *build-proxy-args
    command: ["poetry", "run", "python", "main.py", "billing-renew"]
    environment:
      DATABASE_URL: postgresql+psycopg://very_english:very_english@postgres:5432/very_english
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      BILLING_RENEW_INTERVAL_SECONDS: "3600"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  billing-sync-payments:
    build:
      context: .
      args: *build-proxy-args
    command: ["poetry", "run", "python", "main.py", "billing-sync-payments"]
    environment:
      DATABASE_URL: postgresql+psycopg://very_english:very_english@postgres:5432/very_english
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      BILLING_SYNC_INTERVAL_SECONDS: "300"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  email-worker:
    build:
      context: .
      args: *build-proxy-args
    command: ["poetry", "run", "python", "main.py", "email-worker"]
    environment:
      REDIS_URL: redis://redis:6379/0
      EMAIL_QUEUE_KEY: email:queue
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-noreply@very-english.local}
      EMAIL_OTP_CODE_TTL_SECONDS: ${EMAIL_OTP_CODE_TTL_SECONDS:-300}
      EMAIL_OTP_CODE_LENGTH: ${EMAIL_OTP_CODE_LENGTH:-6}
      EMAIL_CODE_PEPPER: ${EMAIL_CODE_PEPPER:-}
      EMAIL_WORKER_INTERVAL_SECONDS: "1"
      EMAIL_DEQUEUE_TIMEOUT_SECONDS: "5"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
  minio_data:
